spring.application.name=akademik-plus-test

# H2 in-memory database for integration tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT fixed test key (base64 of 53-byte test string, 424 bits)
security.jwt.secret-key=dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci10ZXN0aW5nLXB1cnBvc2VzLW9ubHk=
security.jwt.expiration-time=3600000

# Stripe fake key, no real charges in tests
stripe.secret.key=sk_test_fake_key_for_testing_purposes_only

# File upload
file.upload-dir=build/test-uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true

# Mailnot configured, EmailService.mailSender stays null
spring.mail.from=noreply@test.com
