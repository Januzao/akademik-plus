services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: akademik-plus-db
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akademik-plus}
      POSTGRES_USER: ${POSTGRES_USER:-akademik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-akademik_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akademik} -d ${POSTGRES_DB:-akademik-plus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: akademik-plus-backend
    env_file:
      - ../.env
    environment:
      # Override localhost -> docker service name so backend can reach postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-akademik-plus}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── React Frontend (Vite dev server) ────────────────────────────────────────
  frontend:
    build:
      context: ../frontend/akademik_plus
      dockerfile: Dockerfile
    container_name: akademik-plus-frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/akademik_plus:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── cAdvisor (container metrics) ────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: akademik-plus-cadvisor
    ports:
      - "8090:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  # ── Ollama (LLM runner) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: akademik-plus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ── Open WebUI (chat UI for Ollama) ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: akademik-plus-open-webui
    ports:
      - "3000:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "false"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  ollama_data:
  open_webui_data:
